{% extends 'base.html' %}

{% block title %}Kirish — Altron AI{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
    }

    .auth-box {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        backdrop-filter: blur(10px);
    }

    .auth-logo {
        text-align: center;
        margin-bottom: 32px;
    }

    .auth-logo h1 {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
    }

    .auth-logo p {
        color: #888;
        font-size: 0.9rem;
        margin-top: 4px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        color: #aaa;
        font-size: 0.85rem;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-group input {
        width: 100%;
        padding: 14px 16px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        transition: all 0.3s;
        outline: none;
    }

    .form-group input:focus {
        border-color: #667eea;
        background: rgba(102,126,234,0.1);
        box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
    }

    .btn-primary {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        letter-spacing: 0.5px;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102,126,234,0.4);
    }

    .auth-footer {
        text-align: center;
        margin-top: 24px;
        color: #888;
        font-size: 0.9rem;
    }

    .auth-footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    .error-msg {
        background: rgba(255, 80, 80, 0.1);
        border: 1px solid rgba(255, 80, 80, 0.3);
        border-radius: 8px;
        padding: 12px;
        color: #ff6b6b;
        font-size: 0.9rem;
        margin-bottom: 20px;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-logo">
            <h1>⚡ ALTRON</h1>
            <p>AI powered Python mentor</p>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Parol</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Kirish →</button>
        </form>

        <div class="auth-footer">
            Akkaunt yo'qmi? <a href="{% url 'register' %}">Ro'yxatdan o'tish</a>
        </div>
    </div>
</div>
{% endblock %}
